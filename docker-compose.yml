services:
  postgres-contacts:
    image: postgres:latest
    container_name: postgres-contacts
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1111
      POSTGRES_DB: ContactsDb
    ports:
      - "5435:5432"
    networks:
      - backend_network
    volumes:
      - postgres_data_contacts:/var/lib/postgresql

networks:
  backend_network:
    driver: bridge

volumes:
  postgres_data_contacts:
