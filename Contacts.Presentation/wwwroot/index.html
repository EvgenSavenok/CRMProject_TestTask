<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contacts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body {
            background-color: #f8f9fa;
        }

        .table-actions {
            white-space: nowrap;
            width: 1%;
        }

        .validation-summary {
            display: none;
        }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Contacts</h2>
        <button class="btn btn-primary" onclick="openAddModal()">
            <i class="bi bi-plus-lg me-1"></i>Add Contact
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0" id="contactsTable">
                <thead class="table-light">
                <tr>
                    <th>Name</th>
                    <th>Mobile Phone</th>
                    <th>Job Title</th>
                    <th>Birth Date</th>
                    <th class="table-actions">Actions</th>
                </tr>
                </thead>
                <tbody id="contactsBody">
                <tr>
                    <td colspan="5" class="text-center text-muted py-4">Loading...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3" id="pagination">
        <span class="text-muted small" id="pageInfo"></span>
        <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-secondary" id="prevBtn" onclick="changePage(-1)">
                <i class="bi bi-chevron-left"></i> Prev
            </button>
            <button class="btn btn-outline-secondary" id="nextBtn" onclick="changePage(1)">
                Next <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal fade" id="contactModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Contact</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger validation-summary" id="validationSummary"></div>
                <form id="contactForm" novalidate>
                    <input type="hidden" id="contactId"/>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" maxlength="200" placeholder="Full name"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mobile Phone <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="mobilePhone" maxlength="20"
                               placeholder="+1 234 567 8900"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Job Title</label>
                        <input type="text" class="form-control" id="jobTitle" maxlength="100"
                               placeholder="e.g. Software Engineer"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Birth Date <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="birthDate"/>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveContact()">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Contact</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete <strong id="deleteContactName"></strong>?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
